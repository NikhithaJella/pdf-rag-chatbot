services:
  - type: web
    name: documind-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
